<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirect root to default agent or listing page
    const defaultAgent = 'javeria';
    const params = new URLSearchParams(window.location.search);
    if (!params.has('agent')) {
      window.location.replace(`agent.html?agent=${defaultAgent}`);
    } else {
      window.location.replace(`agent.html?${params.toString()}`);
    }
  </script>
</head>
<body>
  <p>Redirecting to agent profile...</p>
</body>
</html>
