<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  if (window.location.hostname === 'www.theattn.com') {
    window.location.replace('https://theattn.com' + window.location.pathname + window.location.search);
  }
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Profile | Evolate Properties</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="agent.css" />
  <link rel="stylesheet" href="footer2.css" />
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>

  <!-- Main Content -->
  <main class="container">
    
    <!-- Profile Section -->
    <section class="profile-section glass">
      <div class="profile-header">
        <a class="avatar-link" id="avatarLink" href="#" target="_blank">
          <div class="avatar-ring"><div class="avatar" id="avatar"></div></div>
        </a>
        <h1 class="name" id="agentName">Loading...</h1>
        <p class="title" id="agentTitle"></p>
        <span class="badge glass" id="agentBadge"></span>
        <a class="short-link" id="shortLink" href="#" target="_blank">
          <i class="fas fa-link"></i><span id="shortLinkText"></span>
        </a>
      </div>
      <div class="social-links" id="socialLinks"></div>
    </section>

    <!-- Listings Section -->
    <section class="links-box">
      <h2 class="box-title">Quick Links</h2>
      <div class="mobile-links glass" id="mobileLinks"></div>
      <div class="desktop-cards" id="desktopCards"></div>
    </section>

    <!-- Company Footer -->
    <footer class="company-section glass">
      <div class="company-logo-wrap">
        <a id="companyLink" href="#" target="_blank">
          <img class="company-logo-img" id="companyLogo" src="" alt="Company Logo" />
        </a>
      </div>
      <div>
        <p class="company-info" id="companyTagline"></p>
        <p class="company-tag">
          <span id="copyright"></span> 
          <a id="companyName" href="#" target="_blank"></a>
        </p>
      </div>
    </footer>
  </main>

  <!-- Theme Toggle -->
  <button class="theme-toggle glass" id="themeToggle" aria-label="Toggle theme">
    <i class="fas fa-sun theme-icon sun"></i>
    <i class="fas fa-moon theme-icon moon"></i>
  </button>

  <!-- Fixed Corner Badge -->
  <a href="https://theattn.com" class="fixed-corner-link" target="_blank" rel="noopener">
    <img src="opthead.png" alt="Home" class="fixed-corner-img" />
  </a>

  <!-- Scripts -->
  <script src="i.js"></script>
</body>
</html>
