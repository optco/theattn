<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      const path = window.location.pathname.replace(/\/$/, '');
      // Skip real files and system pages
      if (!path || path.includes('.') || ['/i','/404','/index'].includes(path)) {
        window.location.href = '/';
        return;
      }
      // Extract slug: /javeria → javeria
      const slug = path.split('/').pop().toLowerCase();
      // Redirect to template with clean param
      window.location.replace(`/i?d=${slug}`);
    })();
  </script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:40px;color:#fff;background:#0f0c29">
  <p>Loading profile...<br><small><a href="/" style="color:#aaa">Go home</a></small></p>
</body>
</html>
